<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theo Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: rgba(255,255,255,0.06);
    --surface-hover: rgba(255,255,255,0.10);
    --border: rgba(255,255,255,0.10);
    --text: #e8e8ed;
    --text-muted: #8888a0;
    --accent-red: #ff4f6d;
    --accent-orange: #ff9f43;
    --accent-yellow: #ffd93d;
    --accent-green: #6bcb77;
    --accent-cyan: #4ecdc4;
    --accent-blue: #5b9fff;
    --accent-purple: #a78bfa;
    --accent-pink: #f472b6;
    --radius: 16px;
    --blur: blur(20px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(91,159,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(167,139,250,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(78,205,196,0.05) 0%, transparent 70%);
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 32px 48px 24px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, #5b9fff, #a78bfa);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .logo h1 {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(90deg, #e8e8ed, #8888a0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo span {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .last-updated {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .refresh-btn:hover {
    background: var(--surface-hover);
    border-color: rgba(255,255,255,0.2);
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 32px 48px 64px;
  }

  /* ── PANEL ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    backdrop-filter: var(--blur);
    overflow: hidden;
    transition: all 0.25s;
    cursor: pointer;
  }

  .panel:hover {
    border-color: rgba(255,255,255,0.18);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .panel.accent-red  { border-top: 3px solid var(--accent-red); }
  .panel.accent-orange { border-top: 3px solid var(--accent-orange); }
  .panel.accent-yellow { border-top: 3px solid var(--accent-yellow); }
  .panel.accent-green  { border-top: 3px solid var(--accent-green); }
  .panel.accent-cyan   { border-top: 3px solid var(--accent-cyan); }
  .panel.accent-blue   { border-top: 3px solid var(--accent-blue); }
  .panel.accent-purple { border-top: 3px solid var(--accent-purple); }
  .panel.accent-pink   { border-top: 3px solid var(--accent-pink); }

  .panel-header {
    padding: 20px 22px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-icon {
    font-size: 28px;
    margin-right: 12px;
  }

  .panel-title {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .panel-count {
    background: rgba(255,255,255,0.1);
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
  }

  .panel-count.has-items {
    background: rgba(255,255,255,0.15);
    color: var(--text);
  }

  .panel-meta {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .panel-body {
    padding: 0 22px 20px;
  }

  /* ── PANEL LIST ── */
  .panel-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .panel-list li {
    padding: 8px 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text);
    display: flex;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.5;
    transition: background 0.15s;
    border: 1px solid transparent;
  }

  .panel-list li:hover {
    background: rgba(255,255,255,0.08);
    border-color: var(--border);
  }

  .panel-list .prio {
    font-size: 10px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    padding: 1px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .prio.high { background: rgba(255,79,109,0.25); color: var(--accent-red); }
  .prio.medium { background: rgba(255,159,67,0.25); color: var(--accent-orange); }
  .prio.low { background: rgba(255,217,61,0.15); color: var(--accent-yellow); }

  .panel-list .status {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .status.pending { background: rgba(91,159,255,0.2); color: var(--accent-blue); }
  .status.done { background: rgba(107,203,119,0.2); color: var(--accent-green); }
  .status.failed { background: rgba(255,79,109,0.2); color: var(--accent-red); }

  .panel-list .item-text { flex: 1; }

  /* ── EMPTY ── */
  .empty {
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
    padding: 16px 0;
  }

  /* ── MORE ── */
  .more-hint {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    padding: 10px 0 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .panel:hover .more-hint { opacity: 1; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: #13131a;
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 720px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
  }

  .modal-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: #13131a;
    z-index: 1;
    border-radius: 20px 20px 0 0;
  }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .modal-close {
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover {
    background: rgba(255,255,255,0.12);
    color: var(--text);
  }

  .modal-body { padding: 24px 28px 32px; }

  /* ── MODAL LIST ── */
  .modal-section {
    margin-bottom: 28px;
  }

  .modal-section:last-child { margin-bottom: 0; }

  .modal-section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .modal-items { list-style: none; display: flex; flex-direction: column; gap: 8px; }

  .modal-item {
    padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    transition: all 0.15s;
  }

  .modal-item:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.12);
  }

  .modal-item-icon {
    font-size: 20px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .modal-item-content { flex: 1; min-width: 0; }

  .modal-item-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .modal-item-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .modal-item-meta {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── DIARY ── */
  .diary-entry {
    padding: 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    margin-bottom: 10px;
  }

  .diary-date {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 8px;
  }

  .diary-themes { display: flex; flex-direction: column; gap: 6px; }

  .diary-theme {
    padding: 8px 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 1024px) {
    .grid { grid-template-columns: repeat(2, 1fr); padding: 24px 24px 48px; }
    header { padding: 24px 24px 20px; }
  }

  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; }
    header { padding: 20px 16px 16px; }
    .grid { padding: 16px 16px 40px; }
  }

  /* ── WIDE PANELS ── */
  .panel.wide { grid-column: span 2; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    border-top: 1px solid var(--border);
  }
</style>
</head>

</div>

// ── RENDER ──
const grid = document.getElementById('grid');
document.getElementById('lastUpdated').textContent = DATA.generated_at || new Date().toLocaleString('zh-CN');

function card(panel) {
  const items = panel.items || [];
  const display = items.slice(0, panel.preview || 4);
  const hasMore = items.length > display.length;

  let listHtml = '';
  if (display.length === 0) {
    listHtml = '<div class="empty">暂无内容</div>';
  } else {
    listHtml = display.map(item => {
      let badge = '';
      if (item.prio) badge = `<span class="prio ${item.prio}">${item.prio === 'high' ? '高' : item.prio === 'medium' ? '中' : '低'}</span>`;
      if (item.status) badge = `<span class="status ${item.status}">${item.status === 'pending' ? '待办' : item.status === 'done' ? '完成' : '失败'}</span>`;
      if (item.tag) badge = `<span class="tag" style="background:${item.tagBg || 'rgba(91,159,255,0.2)'};color:${item.tagColor || '#5b9fff'}">${item.tag}</span>`;

      return `<li>
        ${badge}
        <span class="item-text">${item.name || item.title || item.text}${item.desc || item.sub ? `<br><span style="font-size:11px;color:var(--text-muted)">${item.desc || item.sub}</span>` : ''}</span>
      </li>`;
    }).join('');
  }

  return `
  <div class="panel ${panel.accent}" onclick="openPanel('${panel.id}')">
    <div class="panel-header">
      <div class="panel-title">
        <span class="panel-icon">${panel.icon}</span>
        ${panel.title}
        <span class="panel-count ${items.length > 0 ? 'has-items' : ''}">${items.length}</span>
      </div>
      ${panel.updated ? `<div class="panel-meta">${panel.updated}</div>` : ''}
    </div>
    <div class="panel-body">
      <ul class="panel-list">${listHtml}</ul>
      ${hasMore ? `<div class="more-hint">↑ 点击查看全部 ${items.length} 项</div>` : ''}
    </div>
  </div>`;
}

grid.innerHTML = DATA.panels.map(card).join('');

// ── MODAL ──
function openPanel(id) {
  const panel = DATA.panels.find(p => p.id === id);
  if (!panel) return;

  document.getElementById('modalTitle').innerHTML = `<span style="font-size:24px">${panel.icon}</span> ${panel.title}`;
  document.getElementById('modalBody').innerHTML = renderModal(panel);
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function renderModal(panel) {
  const items = panel.items || [];
  if (items.length === 0) return '<div class="empty">暂无内容</div>';

  if (panel.id === 'diary') {
    return items.map(entry => `
      <div class="modal-section">
        <div class="modal-section-title">${entry.date}</div>
        <div class="diary-themes">
          ${entry.themes.map(t => `<div class="diary-theme">${t.icon} ${t.name}</div>`).join('')}
        </div>
      </div>`).join('');
  }

  if (panel.id === 'skills') {
    const cats = {};
    items.forEach(s => { if (!cats[s.category]) cats[s.category] = []; cats[s.category].push(s); });
    return Object.entries(cats).map(([cat, skills]) => `
      <div class="modal-section">
        <div class="modal-section-title">${cat}</div>
        <div class="modal-items">
          ${skills.map(s => `
            <div class="modal-item">
              <div class="modal-item-icon">${s.icon || '◆'}</div>
              <div class="modal-item-content">
                <div class="modal-item-title">${s.name}</div>
                <div class="modal-item-desc">${s.desc}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>`).join('');
  }

  if (panel.id === 'wiki') {
    return `
      <div class="modal-section">
        <div class="modal-section-title">概念 (${items.filter(i=>i.type==='concept').length})</div>
        <div class="modal-items">
          ${items.filter(i=>i.type==='concept').map(i=>`<div class="modal-item"><div class="modal-item-icon">💡</div><div class="modal-item-content"><div class="modal-item-title">${i.title}</div><div class="modal-item-desc">${i.desc || ''}</div></div></div>`).join('')}
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">人物/实体 (${items.filter(i=>i.type==='entity').length})</div>
        <div class="modal-items">
          ${items.filter(i=>i.type==='entity').map(i=>`<div class="modal-item"><div class="modal-item-icon">👤</div><div class="modal-item-content"><div class="modal-item-title">${i.title}</div><div class="modal-item-desc">${i.desc || ''}</div></div></div>`).join('')}
        </div>
      </div>`;
  }

  // Default: list all items
  return `
    <div class="modal-section">
      <div class="modal-section-title">全部 ${items.length} 项</div>
      <div class="modal-items">
        ${items.map(item => {
          let badges = '';
          if (item.prio) badges += `<span class="prio ${item.prio}">${item.prio === 'high' ? '高' : item.prio === 'medium' ? '中' : '低'}优先级</span>`;
          if (item.status) badges += `<span class="status ${item.status}">${item.status === 'pending' ? '待办' : item.status === 'done' ? '完成' : '失败'}</span>`;
          if (item.tag) badges += `<span class="tag" style="background:${item.tagBg||'rgba(91,159,255,0.2)'};color:${item.tagColor||'#5b9fff'}">${item.tag}</span>`;
          return `<div class="modal-item">
            <div class="modal-item-icon">${item.icon || panel.icon}</div>
            <div class="modal-item-content">
              <div class="modal-item-title">${item.text}</div>
              ${item.sub ? `<div class="modal-item-desc">${item.sub}</div>` : ''}
              ${badges ? `<div class="modal-item-meta">${badges}</div>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}
