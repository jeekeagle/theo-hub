<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Theo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;510;590&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08090a;
      --panel: #0f1011;
      --surface: #191a1b;
      --surface-2: #28282c;
      --text: #f7f8f8;
      --text-2: #d0d6e0;
      --text-3: #8a8f98;
      --text-4: #62666d;
      --border: rgba(255,255,255,0.05);
      --border-std: rgba(255,255,255,0.08);
      --accent: #7170ff;
      --accent-dim: #5e6ad2;
      --radius-sm: 6px;
      --radius: 8px;
      --radius-lg: 12px;
      --font-ui: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    .nav-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,9,10,0.85);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      padding: 0 24px;
      height: 52px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
    }
    .nav-label {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 500;
      color: var(--text-3);
      letter-spacing: -0.3px;
    }
    .nav-title {
      font-family: var(--font-ui);
      font-size: 19px;
      font-weight: 590;
      color: var(--text);
      letter-spacing: -0.4px;
    }
    .nav-actions {
      display: flex; align-items: center; gap: 8px;
    }
    .nav-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0 14px; height: 32px;
      border-radius: var(--radius-sm);
      font-family: var(--font-ui); font-size: 14px; font-weight: 510;
      color: var(--text-2);
      text-decoration: none;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.15s;
    }
    .nav-btn:hover {
      color: var(--text);
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
    }
    .nav-icon-btn {
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-2);
      transition: all 0.15s;
    }
    .nav-icon-btn:hover {
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }
    .sun-icon, .moon-icon { display: block; }

    /* ── Container ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

    /* ── Filter ── */
    .filter-bar {
      display: flex; align-items: center; gap: 6px; margin-bottom: 28px;
    }
    .filter-label {
      font-family: var(--font-mono); font-size: 12px; color: var(--text-4);
      margin-right: 6px; letter-spacing: 0.02em;
    }
    .filter-btn {
      font-family: var(--font-ui); font-size: 13px; font-weight: 510;
      padding: 5px 14px; border-radius: 9999px;
      border: 1px solid var(--border-std);
      background: transparent;
      color: var(--text-3);
      cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover {
      color: var(--text-2);
      background: rgba(255,255,255,0.04);
    }
    .filter-btn.active {
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.12);
    }

    /* ── Gallery Grid ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    /* ── Card ── */
    .img-card {
      background: var(--surface);
      border: 1px solid var(--border-std);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      display: flex; flex-direction: column;
    }
    .img-card:hover {
      border-color: rgba(255,255,255,0.14);
      transform: translateY(-2px);
    }
    .card-thumb {
      width: 100%; aspect-ratio: 4/3;
      overflow: hidden; position: relative;
      background: var(--panel);
    }
    .card-thumb img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; transition: transform 0.3s;
    }
    .img-card:hover .card-thumb img { transform: scale(1.04); }

    .card-body { padding: 14px 16px 16px; flex: 1; }
    .card-title {
      font-family: var(--font-ui); font-size: 14px; font-weight: 590;
      color: var(--text); line-height: 1.4; margin-bottom: 10px;
      letter-spacing: -0.2px;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .card-tag {
      font-family: var(--font-mono); font-size: 10px;
      padding: 2px 8px; border-radius: 3px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--text-4); letter-spacing: 0.02em;
    }

    /* ── Empty ── */
    .empty-state {
      display: none; text-align: center; padding: 80px 0;
      font-size: 14px; color: var(--text-4);
      font-family: var(--font-mono);
    }
    .empty-state.visible { display: block; }
  </style>
</head>
<body>

<nav class="nav-bar">
  <div class="nav-inner">
    <div class="nav-brand">
      <span class="nav-label">//</span>
      <span class="nav-title">Gallery</span>
    </div>
    <div class="nav-actions">
      <a href="https://jeekeagle.github.io/theo-hub/" class="nav-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Hub
      </a>
      <button class="nav-icon-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
        <svg class="sun-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="moon-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</nav>

<div class="container">
  <div class="filter-bar">
    <span class="filter-label">Type</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="arch">架构图</button>
    <button class="filter-btn" data-filter="infocard">信息卡</button>
  </div>

  <div class="gallery-grid" id="gallery"></div>
  <div class="empty-state" id="emptyState">— nothing here —</div>
</div>

<script>
  const IMAGES = [
    {
      id: "theo-architecture",
      title: "Theo — Hermes Personal AI System",
      category: "arch",
      tags: ["Hermes", "Theo", "AI-System"],
      src: "theo-architecture.html",
      thumb: "theo-architecture.png"
    }
  ];

  function renderImages(filter) {
    const filtered = filter === 'all' ? IMAGES : IMAGES.filter(i => i.category === filter);
    const gallery = document.getElementById('gallery');
    const emptyState = document.getElementById('emptyState');
    gallery.innerHTML = '';
    emptyState.classList.toggle('visible', filtered.length === 0);

    filtered.forEach(img => {
      const card = document.createElement('div');
      card.className = 'img-card';
      card.innerHTML = `
        <div class="card-thumb">
          <img src="${img.thumb}" alt="${img.title}" loading="lazy"
               onerror="this.style.display='none'">
        </div>
        <div class="card-body">
          <div class="card-title">${img.title}</div>
          <div class="card-tags">
            ${img.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
          </div>
        </div>
      `;
      card.addEventListener('click', () => { window.location.href = img.src; });
      gallery.appendChild(card);
    });
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderImages(btn.dataset.filter);
    });
  });

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? '' : 'light');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    updateThemeIcon(!isDark);
  }
  function updateThemeIcon(isDark) {
    document.querySelectorAll('.sun-icon').forEach(el => el.style.display = isDark ? 'none' : 'block');
    document.querySelectorAll('.moon-icon').forEach(el => el.style.display = isDark ? 'block' : 'none');
  }
  function initTheme() {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const isDark = saved ? saved === 'dark' : prefersDark;
    if (!isDark) document.documentElement.setAttribute('data-theme', 'light');
    updateThemeIcon(isDark);
  }

  initTheme();
  renderImages('all');
</script>
</body>
</html>
