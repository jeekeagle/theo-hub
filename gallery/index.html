<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Theo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --text: #1d1d1f;
      --text-2: #86868b;
      --text-3: #acacb0;
      --border: rgba(0,0,0,0.08);
      --shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
      --shadow-hover: 0 8px 30px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.06);
      --accent: #0071e3;
      --radius: 12px;
      --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --cat-arch-bg: rgba(0,113,227,0.08);
      --cat-arch: #0071e3;
      --cat-infocard-bg: rgba(175,82,222,0.08);
      --cat-infocard: #af52de;
    }
    [data-theme="dark"] {
      --bg: #000;
      --surface: #1c1c1e;
      --text: #f5f5f7;
      --text-2: #98989d;
      --text-3: #636366;
      --border: rgba(255,255,255,0.1);
      --shadow: 0 2px 12px rgba(0,0,0,0.4);
      --shadow-hover: 0 8px 30px rgba(0,0,0,0.5);
      --accent: #0a84ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Nav ── */
    .nav-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(245,245,247,0.8);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border);
    }
    [data-theme="dark"] .nav-bar { background: rgba(0,0,0,0.8); }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      padding: 0 24px;
      height: 44px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand { display: flex; align-items: center; gap: 8px; }
    .nav-label {
      font-family: var(--font-mono); font-size: 12px; color: var(--text-3);
    }
    .nav-title {
      font-family: var(--font-ui); font-size: 13px; font-weight: 500; color: var(--text);
    }
    .nav-actions { display: flex; align-items: center; gap: 8px; }
    .nav-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 8px;
      font-size: 12px; font-weight: 500; color: var(--text-2);
      text-decoration: none; border: 1px solid var(--border);
      background: var(--surface); transition: all 0.15s;
    }
    .nav-btn:hover { color: var(--text); border-color: var(--text-3); }
    .nav-icon-btn {
      width: 32px; height: 32px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-2); transition: all 0.15s;
    }
    .nav-icon-btn:hover { color: var(--text); }
    .sun-icon, .moon-icon { display: block; }

    /* ── Layout ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px 60px; }

    /* ── Filter ── */
    .filter-bar {
      display: flex; align-items: center; gap: 6px; margin-bottom: 24px;
    }
    .filter-label {
      font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
      margin-right: 4px;
    }
    .filter-btn {
      font-family: var(--font-ui); font-size: 12px; font-weight: 500;
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-2); cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--text-3); }
    .filter-btn.active {
      background: var(--text); color: var(--bg);
      border-color: var(--text);
    }

    /* ── Gallery Grid ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    /* ── Card ── */
    .img-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease);
      display: flex; flex-direction: column;
    }
    .img-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }

    .card-thumb {
      width: 100%; aspect-ratio: 4/3;
      overflow: hidden; position: relative;
      background: var(--bg);
    }
    .card-thumb img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; transition: transform 0.3s var(--ease-out);
    }
    .img-card:hover .card-thumb img { transform: scale(1.03); }

    .card-body { padding: 12px 14px 14px; flex: 1; }
    .card-title {
      font-family: var(--font-ui); font-size: 13px; font-weight: 500;
      color: var(--text); line-height: 1.4; margin-bottom: 8px;
      letter-spacing: -0.1px;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .card-tag {
      font-family: var(--font-mono); font-size: 9px;
      padding: 2px 7px; border-radius: 4px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text-3);
    }

    /* ── Empty ── */
    .empty-state {
      display: none; text-align: center; padding: 60px 0;
      font-size: 14px; color: var(--text-3);
      font-family: var(--font-mono);
    }
    .empty-state.visible { display: block; }
  </style>
</head>
<body>

<nav class="nav-bar">
  <div class="nav-inner">
    <div class="nav-brand">
      <span class="nav-label">// Gallery</span>
      <span class="nav-title">结构图库</span>
    </div>
    <div class="nav-actions">
      <a href="https://jeekeagle.github.io/theo-hub/" class="nav-btn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Hub
      </a>
      <button class="nav-icon-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
        <svg class="sun-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="moon-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</nav>

<div class="container">
  <div class="filter-bar">
    <span class="filter-label">Type</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="arch">架构图</button>
    <button class="filter-btn" data-filter="infocard">信息卡</button>
  </div>

  <div class="gallery-grid" id="gallery"></div>
  <div class="empty-state" id="emptyState">— nothing here —</div>
</div>

<script>
  const IMAGES = [
    {
      id: "theo-architecture",
      title: "Theo — Hermes Personal AI System",
      category: "arch",
      tags: ["Hermes", "Theo", "AI-System"],
      src: "theo-architecture.html",
      thumb: "theo-architecture.png"
    }
  ];

  const getCatLabel = (cat) => ({ arch: '架构图', infocard: '信息卡' }[cat] || cat);

  function renderImages(filter) {
    const filtered = filter === 'all' ? IMAGES : IMAGES.filter(i => i.category === filter);
    const gallery = document.getElementById('gallery');
    const emptyState = document.getElementById('emptyState');
    gallery.innerHTML = '';
    emptyState.classList.toggle('visible', filtered.length === 0);

    filtered.forEach(img => {
      const card = document.createElement('div');
      card.className = 'img-card';
      card.innerHTML = `
        <div class="card-thumb">
          <img src="${img.thumb}" alt="${img.title}" loading="lazy"
               onerror="this.style.display='none'">
        </div>
        <div class="card-body">
          <div class="card-title">${img.title}</div>
          <div class="card-tags">
            ${img.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
          </div>
        </div>
      `;
      card.addEventListener('click', () => { window.location.href = img.src; });
      gallery.appendChild(card);
    });
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderImages(btn.dataset.filter);
    });
  });

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    updateThemeIcon(!isDark);
  }
  function updateThemeIcon(isDark) {
    document.querySelectorAll('.sun-icon').forEach(el => el.style.display = isDark ? 'none' : 'block');
    document.querySelectorAll('.moon-icon').forEach(el => el.style.display = isDark ? 'block' : 'none');
  }
  function initTheme() {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const isDark = saved ? saved === 'dark' : prefersDark;
    if (isDark) document.documentElement.setAttribute('data-theme', 'dark');
    updateThemeIcon(isDark);
  }

  initTheme();
  renderImages('all');
</script>
</body>
</html>
