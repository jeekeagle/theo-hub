<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打破默认：创新的起点与成长的本质</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: 'Inter', 'Noto Sans SC', sans-serif;
  background: #f5f3ed;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  width: 900px;
  max-width: 95vw;
  background: #f5f3ed;
  padding: 50px;
  box-sizing: border-box;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  opacity: 0.04;
  pointer-events: none;
}
.header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 35px;
  position: relative;
  z-index: 1;
}
.meta {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 12px;
}
.main-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 56px;
  font-weight: 900;
  line-height: 1.1;
  color: #0a0a0a;
  max-width: 700px;
}
.accent-bar {
  width: 60px;
  height: 6px;
  background: #e63946;
  margin-top: 20px;
}
.content { position: relative; z-index: 1; }
.content-body {
  font-size: 18px;
  line-height: 1.7;
  color: #1a1a1a;
  margin-bottom: 28px;
}
.concept-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
  margin: 35px 0;
}
.concept-item {
  background: rgba(0,0,0,0.04);
  padding: 22px;
  border-left: 4px solid #e63946;
}
.concept-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 8px;
}
.concept-text {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px;
  font-weight: 700;
  color: #0a0a0a;
}
.quote-block {
  background: rgba(230, 57, 70, 0.08);
  border-left: 4px solid #e63946;
  padding: 22px 28px;
  margin: 30px 0;
  font-size: 19px;
  line-height: 1.6;
  color: #1a1a1a;
  font-style: italic;
}
.divider {
  width: 100%;
  height: 2px;
  background: rgba(0,0,0,0.08);
  margin: 35px 0;
}
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 1;
}
.tags {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.tag {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #666;
  background: rgba(0,0,0,0.06);
  padding: 6px 12px;
}
.source {
  font-size: 12px;
  color: #999;
}
@media (max-width: 600px) {
  .card { padding: 30px 25px; }
  .main-title { font-size: 36px; }
  .concept-grid { grid-template-columns: 1fr; gap: 15px; }
}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div>
      <div class="meta">Night Routine · 2026-04-09</div>
      <h1 class="main-title">打破默认：<br>创新的起点与<br>成长的本质</h1>
      <div class="accent-bar"></div>
    </div>
  </div>
  <div class="content">
    <p class="content-body">
      默认是认知的捷径，也是创新的坟墓。技术史上几乎所有重大突破，都始于有人对「默认设定」说了「不」。
    </p>
    <div class="concept-grid">
      <div class="concept-item">
        <div class="concept-label">核心机制</div>
        <div class="concept-text">默认质疑</div>
      </div>
      <div class="concept-item">
        <div class="concept-label">成长本质</div>
        <div class="concept-text">扩大边界</div>
      </div>
      <div class="concept-item">
        <div class="concept-label">创新起点</div>
        <div class="concept-text">打破假设</div>
      </div>
    </div>
    <div class="quote-block">
      创新的起点，从来不是「更努力地做同一件事」，而是「质疑那件被认为理所当然的事」。
    </div>
    <div class="divider"></div>
    <p class="content-body">
      <strong>一表象对多本质</strong>——同一个现象背后有多个深层逻辑<br>
      <strong>一本质对多表象</strong>——同一个本质在不同场景下呈现不同面貌<br>
      <strong>主观能动性的着力点在「评价」</strong>——我们能主动做的是建立评价体系和标准
    </p>
  </div>
  <div class="footer">
    <div class="tags">
      <span class="tag">默认</span>
      <span class="tag">创新</span>
      <span class="tag">成长</span>
      <span class="tag">认知</span>
    </div>
    <div class="source">Seed · jeekeagle.github.io</div>
  </div>
</div>
</body>
</html>
