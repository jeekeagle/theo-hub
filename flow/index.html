<head>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ─── Design Tokens · Notion-Inspired Warm Minimal ─── */
    :root {
      --bg: #ffffff;
      --bg-alt: #f6f5f4;
      --text: rgba(0,0,0,0.95);
      --text-secondary: #615d59;
      --text-muted: #a39e98;
      --accent: #0075de;
      --accent-dark: #005bab;
      --border: rgba(0,0,0,0.1);
      --shadow-card: rgba(0,0,0,0.04) 0px 4px 18px, rgba(0,0,0,0.027) 0px 2.025px 7.84688px, rgba(0,0,0,0.02) 0px 0.8px 2.925px, rgba(0,0,0,0.01) 0px 0.175px 1.04062px;
      --radius-sm: 4px;
      --radius-md: 12px;
      --radius-pill: 9999px;
      --font: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ─── Header ─── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
    }
    .brand {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand-icon {
      width: 28px;
      height: 28px;
      background: var(--text);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .brand-icon svg { width: 16px; height: 16px; }
    .header-meta {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ─── Hero ─── */
    .hero {
      max-width: 720px;
      margin: 0 auto;
      padding: 72px 24px 56px;
      text-align: center;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.125px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .hero-eyebrow-dot {
      width: 6px;
      height: 6px;
      background: #1aae39;
      border-radius: 50%;
    }
    .hero h1 {
      font-size: 54px;
      font-weight: 700;
      letter-spacing: -1.875px;
      line-height: 1.04;
      color: var(--text);
      margin-bottom: 20px;
    }
    .hero p {
      font-size: 18px;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.55;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ─── Filter Bar ─── */
    .filter-bar {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-right: 4px;
    }
    .filter-btn {
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
    .filter-btn.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }
    .count-badge {
      font-size: 11px;
      font-weight: 600;
      background: var(--text-muted);
      color: #fff;
      border-radius: var(--radius-pill);
      padding: 1px 6px;
      margin-left: 4px;
    }
    .filter-btn.active .count-badge { background: rgba(255,255,255,0.4); }

    /* ─── Post Grid ─── */
    .posts-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }
    .posts-grid {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* ─── Post Item ─── */
    .post-item {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px 28px;
      cursor: pointer;
      transition: box-shadow 0.18s ease, transform 0.15s ease;
      position: relative;
      background: var(--bg);
    }
    .post-item:hover {
      box-shadow: var(--shadow-card);
      transform: translateY(-1px);
    }
    .post-item-category {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.125px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .post-item-content {
      font-size: 16px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 14px;
    }
    .post-item-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .post-item-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: var(--radius-pill);
      background: var(--bg-alt);
      color: var(--text-secondary);
    }
    .post-item-time {
      font-size: 12px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .post-item-question {
      font-size: 13px;
      color: var(--accent);
      margin-top: 12px;
      font-style: italic;
      border-left: 2px solid var(--accent);
      padding-left: 10px;
    }

    /* ─── Expanded Post ─── */
    .post-detail {
      display: none;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .post-item.expanded .post-detail { display: block; }
    .post-detail-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.125px;
      color: var(--text-muted);
      margin-bottom: 8px;
      margin-top: 16px;
    }
    .post-detail-label:first-child { margin-top: 0; }
    .post-detail-text {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-secondary);
    }
    .post-detail-divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* ─── Empty State ─── */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
    }
    .empty-state-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      opacity: 0.4;
    }

    /* ─── Footer ─── */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 24px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ─── Responsive ─── */
    @media (max-width: 600px) {
      .hero { padding: 48px 20px 40px; }
      .hero h1 { font-size: 36px; letter-spacing: -1.25px; }
      .filter-bar { padding: 0 20px 32px; }
      .posts-container { padding: 0 20px 60px; }
      .post-item { padding: 20px; }
    }
  </style>
</head>

    const MANIFEST = {"version": "1.0", "updated": "2026-04-12T09:21:30+08:00", "posts": [{"id": "life-dimension-ozgh", "content": "人们总在问\"你的人生过得好不好\"，却从不追问评价的标准是什么。\n\n成功学给出的答案是钱、权、名。这没有错，但它是**乘法**——基数不行，其他维度都是零。\n\n真正完整的评价框架是三维的：**情绪健康和人际关系**是基数，是底层的 1。**学历杠杆、认知杠杆**是乘法，一切非线性增长都靠它。**心智重构**是第三维，它决定你用前两维做什么。", "originalContent": "我们总反思自己的人生过得怎么样，有时候也会问别人的人生过得怎么样。但是这句话所表达的真实含义，很少有人能够真正理解——评价人生的方法到底是什么？\n\n每个人有不一样的想法。就像成功的标准一样：很多人想挣钱，很多人想得权力，也有人想留下名声。\n\n对我来说，我想有一个三维度的评价方法：\n\n第一个维度叫基数。在这个维度上，就是我们的情绪健康和人际关系等等。\n\n第二个维度就是乘法或者加法。用时间换金钱的工作就是加法，加法的本质是线性的变化。然后乘法是你有学历杠杆，你有认知杠杆，一切带有杠杆属性的都是乘法。\n\n那么第三个维度，就是我们所说的心智重构。", "category": "翻转", "contentTags": ["基数", "杠杆"], "question": "你有没有一个评价自己人生的框架？它是什么？", "created": "2026-04-12T05:37:29+08:00"}, {"id": "tech-exploration-balance-bgdh", "content": "技术探索本身并非无用，但方向偏离时，就成了大量无用功的来源。**真正的问题不是探索本身，而是我们容易在一些无谓的点上做探索，而忘了权衡收益与投入的时间。** 把主要时间 focus 到我们应该主要做的事情上——我们看到的、感受到的、正在做的，这些决定了我们的人生。", "originalContent": "有时候我们在做技术探索的时候，大部分时间可能都做了无用功。这并不是说这些探索本身没有价值，而是因为我们想象的技术探索方向，跟真正技术实现的路线往往是不一致的。当方向走偏了，就被迫用大量的时间在做探索。我们并不是说这些探索是没有用的，而是说在使用新技术的时候，应该权衡一下收益跟投入时间的平衡性。不要在一些无谓的点上做无谓的探索，而是把主要的时间 focus 到我们应该主要做的事情上。\n\n总结来说，我们看到的什么，我们感受到的是什么，我们做的是什么——这些事情决定了我们的人生。", "category": "方法论", "contentTags": ["方向选择", "时间投入"], "question": "什么才是值得探索的方向？", "created": "2026-04-12T09:09:38+08:00"}, {"id": "stimulus-response-choice-aj9z", "content": "在刺激和回应之间，还有自由选择的空间。**这不是鸡汤，是心智重构的路径。** 面对同样的事情，不同的解释框架会让你看到完全不同的世界。积极心理学给的，就是这样一种框架。", "originalContent": "在刺激和回应之间还有自由选择的空间。这不是一句鸡汤，而是关于心智重构的描述。我们可以对自己进行心智重构，用积极心理学的视角来看待周围发生的这些事情。这是在刺激和回应之间那个空间里，我们拥有的选择权。", "category": "翻转", "contentTags": ["刺激回应", "心智重构"], "question": "你在刺激和回应之间，选择了什么？", "created": "2026-04-12T09:21:30+08:00"}, {"id": "agency-boundary-acceptance-fojp", "content": "主观能动性不是改变世界，是分清边界。**能改变的，迅速行动；不能改变的，拒绝抱怨。** 海边遭遇大风，我们立刻换了安排，没有半句怨言。这就是美好生活的密度。", "originalContent": "在海边遇到突发天气变化，帐篷支撑不住。我们没有抱怨，而是很快改变了安排。这就是主观能动性的体现——分清哪些能改变、哪些不能改变。对不能改变的不抱怨，对能改变的用新框架框住。美好生活的密度，来自这种适应能力。", "category": "心性", "contentTags": ["主观能动性", "适应力"], "question": "你最近在抱怨的那件事，真的不能改变吗？", "created": "2026-04-12T09:21:30+08:00"}, {"id": "attention-behavior-design-kfsj", "content": "商场没有钟表，永远明亮，让你感受不到时间流逝。刷手机没有停止点，书翻完了会停，但往下刷就停不下来。**这就是行为设计在偷走你的注意力。** 能识别它，是提高认知的第一步。", "originalContent": "商场里没有钟表，永远那么明亮，让人感受不到时间流失。刷手机没有停止点——书翻完了会停，但往下刷没有底。这就是行为设计在消耗消耗者注意力。能够发现这些成瘾设计背后的逻辑，是很重要的认知。", "category": "认知", "contentTags": ["行为设计", "注意力"], "question": "你每天有多少注意力是被设计好的？", "created": "2026-04-12T09:21:30+08:00"}, {"id": "presence-parenting-phone-cnyk", "content": "陪孩子在场，不是身体在场就够了。**你在哪里，心在哪里？** 她问「爸爸怎么没看到我」的时候，我在看手机。信息时代的育儿迷茫，就是这种身心分离。", "originalContent": "在游乐场陪女儿，她在问我为什么没看到她，我在玩手机没有回答她。要享受陪伴孩子的时光，而且要在场，不能身体在场而思绪在手机上。这是对信息时代育儿迷茫的一个反思。", "category": "育儿", "contentTags": ["在场", "信息时代"], "question": "你陪孩子的时候，心在哪里不在？", "created": "2026-04-12T09:21:30+08:00"}, {"id": "let-go-child-rules-9b3n", "content": "孩子设计规则，大人配合。**放手不是放任，是把主动权还给孩子。** 她想让我对就对、错就错，全程她在掌舵。这种感觉，才是真正的放手。", "originalContent": "滑梯游戏，女儿设计规则让我猜，全程都是她在设计。她想让我对就对，想让我错就错。这很有意思的育儿理念——让孩子设计规则，家长配合。这是在放手。", "category": "育儿", "contentTags": ["放手", "主动权"], "question": "你在什么事情上还在替孩子做决定？", "created": "2026-04-12T09:21:30+08:00"}, {"id": "books-ai-assumption-xmcs", "content": "在西西弗书店翻商业书，忽然想问：AI时代，书籍学习的假设还成立吗？**假设一：知识在书里；假设二：读书是最优路径。** 两个都在被动摇。", "originalContent": "在西西弗书店看到很多商业图书，思考AI时代我们对书藉的认知是否还适用。两层反思：还要不要通过书籍学习？还要不要通过阅读学习？打破了两个假设。", "category": "未来", "contentTags": ["AI时代", "书籍学习"], "question": "你最近一次从书籍里获得认知，是什么时候？", "created": "2026-04-12T09:21:30+08:00"}, {"id": "kos-cognition-kernel-ai5c", "content": "能容纳两种相反观点不代表认知高，那是黑白思维。**真正的高阶认知是：有稳定的Kernel，灵活的OS，千人千面的UI。** 不是容器大，是内核稳。", "originalContent": "菲茨杰拉德说能容纳两种相反观点说明认知高，但这是黑白思维。更高版本是Kernel内核（稳定）+OS操作系统（灵活）+UI界面（千人千面）。不是容纳两种观点，是有足够稳定的内核让OS和UI在外围自如运转。", "category": "翻转", "contentTags": ["KOS架构", "内核稳定"], "question": "你的Kernel够稳定吗？", "created": "2026-04-12T09:21:30+08:00"}, {"id": "book-types-commerce-art-w9c9", "content": "书店里两类书：一类名字为卖书而生（商品），一类名字从内容里长出来（作品）。**前者引导注意力，后者拓展认知边界。** 你在哪类书上花时间？", "originalContent": "书店里两类书的命名逻辑：一类是为了卖书起的吸人的名字（商品），一类是为时代写的从内容里长出来的名字（作品）。本质区别是引导注意力vs拓展认知边界。", "category": "认知", "contentTags": ["商品书", "作品书"], "question": "你最近读的那本书，是商品还是作品？", "created": "2026-04-12T09:21:30+08:00"}, {"id": "age-change-embodied-ymvg", "content": "看自己的照片感到陌生，膝盖盖疼三天才会休息。**让人接受变化的，从来不是道理，是具体感受。** 35岁开始学会正视自己，做正确的事，减少消耗。", "originalContent": "35岁的变化，看自己照片感到陌生，AI生成45岁模样，打球膝盖盖疼三天。正视自己要做正确的选择，减少消耗。", "category": "成长", "contentTags": ["35岁", "减少消耗"], "question": "你用什么具体感受来校准自己的选择？", "created": "2026-04-12T09:21:30+08:00"}, {"id": "ai-revolution-deep-sea-y2fq", "content": "一切看起来风平浪静，但AI革命在深海底层发生。**以前工业革命改产品，AI革命改基础设置。** 你站在海面，看不见暗流。感受不到变化，不等于没有变化。", "originalContent": "商场里看起来没变化但AI革命在深海底层发生。以前工业革命是产品级的，AI革命是基础设置级的，改变最底层的东西：算力、模型能力、生产力逻辑。感受不到变化是因为变化在深海，站在海面看不见暗流。", "category": "未来", "contentTags": ["AI革命", "基础设置"], "question": "你感受到了哪些AI带来的底层变化？", "created": "2026-04-12T09:21:30+08:00"}, {"id": "eating-balance-body-need-1cyv", "content": "身体需要的能量，比你以为的要少。**分清「需要」和「欲望」，是饮食哲学的核心。** 今天吃得少，下午反而更有活力——欲望满足和身体需求，是两件事。", "originalContent": "身体不需要那么多能量，分清需要和欲望，找到balance。吃得少、咖啡因，下午反而更有活力。身体需要的和欲望想要的不一样，找到这个平衡点，是饮食哲学的核心。", "category": "健康", "contentTags": ["饮食哲学", "需要与欲望"], "question": "你吃的那顿饭，是身体需要还是欲望驱动？", "created": "2026-04-12T09:21:30+08:00"}]};

      return `${d.getMonth()+1}月${d.getDate()}日`;
    }

    function getCategories(posts) {
      const cats = ['全部'];
      const seen = new Set();
      posts.forEach(p => {
        if (p.category && !seen.has(p.category)) {
          seen.add(p.category);
          cats.push(p.category);
        }
      });
      return cats;
    }

    function countByCategory(posts, cat) {
      if (cat === '全部') return posts.length;
      return posts.filter(p => p.category === cat).length;
    }

    function buildTag(tag) {
      return `<span class="tag">${tag}</span>`;
    }

    function buildPost(post) {
      const tags = (post.contentTags || []).map(buildTag).join('');
      return `
        <article class="post-item" data-id="${post.id}">
          <div class="post-item-category">${post.category || '未分类'}</div>
          <div class="post-item-content">${post.content}</div>
          <div class="post-item-footer">
            <div class="post-item-tags">${tags}</div>
            <div class="post-item-time">${formatDate(post.created)}</div>
          </div>
          ${post.question ? `<div class="post-item-question">${post.question}</div>` : ''}
          <div class="post-detail">
            <div class="post-detail-divider"></div>
            <div class="post-detail-label">原始流畅版</div>
            <div class="post-detail-text">${post.originalContent || '—'}</div>
            ${post.question ? `
            <div class="post-detail-label" style="margin-top:16px">问题</div>
            <div class="post-detail-text">${post.question}</div>` : ''}
          </div>
        </article>
      `;
    }

    function renderFilterBar(categories, posts) {
      const bar = document.getElementById('filter-bar');
      bar.innerHTML = `<span class="filter-label">分类</span>` +
        categories.map(cat => `
          <button class="filter-btn${cat === activeCategory ? ' active' : ''}" data-cat="${cat}">
            ${cat}<span class="count-badge">${countByCategory(posts, cat)}</span>
          </button>
        `).join('');
      bar.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeCategory = btn.dataset.cat;
          renderFilterBar(categories, posts);
          renderPosts(posts);
        });
      });
    }

    function renderPosts(posts) {
      const grid = document.getElementById('posts-grid');
      const filtered = activeCategory === '全部'
        ? posts
        : posts.filter(p => p.category === activeCategory);

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">
              <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="24" cy="24" r="20"/>
                <path d="M16 24h16M24 16v16"/>
              </svg>
            </div>
            <p>该分类下暂无内容</p>
          </div>`;
        return;
      }

      grid.innerHTML = filtered.map(buildPost).join('');

      // Click to expand
      grid.querySelectorAll('.post-item').forEach(item => {
        item.addEventListener('click', (e) => {
          // Don't expand if clicking a link
          if (e.target.tagName === 'A') return;
          item.classList.toggle('expanded');
        });
      });
    }

    /* ─── Boot ─── */
    const posts = MANIFEST.posts || [];
    const categories = getCategories(posts);

    document.getElementById('post-count').textContent = `${posts.length} 条灵感`;

    renderFilterBar(categories, posts);
    renderPosts(posts);
  </script>

</body>
</html>
