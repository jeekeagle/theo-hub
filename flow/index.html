<style>
/* ==========================================================================
   Flow v2.1.0 — Warm Editorial Magazine
   ========================================================================== */

:root {
  --bg:           #f7f4ef;
  --surface:      #ffffff;
  --surface-2:    #f2efe9;
  --border:       rgba(30,25,18,0.08);
  --border-2:     rgba(30,25,18,0.15);
  --text:         #1e1912;
  --text-2:       #6b6256;
  --text-3:       #a89f94;
  --accent:        #b85c2a;
  --accent-bg:     rgba(184,92,42,0.07);
  --tag-cat-txt:  #b85c2a;
  --tag-cat-bg:   rgba(184,92,42,0.08);
  --tag-cat-bd:   rgba(184,92,42,0.22);
  --tag-cnt-txt:  #8a5a00;
  --tag-cnt-bg:   rgba(138,90,0,0.07);
  --tag-cnt-bd:   rgba(138,90,0,0.18);
  --shadow-sm:    0 1px 3px rgba(30,25,18,0.04), 0 1px 2px rgba(30,25,18,0.03);
  --shadow-md:    0 4px 16px rgba(30,25,18,0.07), 0 2px 4px rgba(30,25,18,0.04);
  --shadow-lg:    0 12px 40px rgba(30,25,18,0.10), 0 4px 12px rgba(30,25,18,0.05);
  --shadow-card:  0 2px 8px rgba(30,25,18,0.05), 0 8px 24px rgba(30,25,18,0.06);
  --radius-sm:    8px;
  --radius-md:    14px;
  --radius-lg:    20px;
  --font-serif:   'Playfair Display', 'Source Serif 4', Georgia, 'Times New Roman', serif;
  --font-body:    'Source Serif 4', Georgia, 'Times New Roman', serif;
  --font-mono:    'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
  --ease:         cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-out:     cubic-bezier(0.16, 1, 0.3, 1);
}

[data-theme="dark"] {
  --bg:           #141210;
  --surface:      #1c1916;
  --surface-2:    #232019;
  --border:       rgba(255,250,242,0.07);
  --border-2:     rgba(255,250,242,0.14);
  --text:         #f5f0e8;
  --text-2:       #a09890;
  --text-3:       #5a544c;
  --accent:        #d4703a;
  --accent-bg:     rgba(212,112,58,0.10);
  --tag-cat-txt:  #d4703a;
  --tag-cat-bg:   rgba(212,112,58,0.10);
  --tag-cat-bd:   rgba(212,112,58,0.28);
  --tag-cnt-txt:  #e8a030;
  --tag-cnt-bg:   rgba(232,160,48,0.10);
  --tag-cnt-bd:   rgba(232,160,48,0.25);
  --shadow-sm:    0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md:    0 4px 16px rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.25);
  --shadow-lg:    0 12px 40px rgba(0,0,0,0.55), 0 4px 12px rgba(0,0,0,0.35);
  --shadow-card:  0 2px 8px rgba(0,0,0,0.35), 0 8px 24px rgba(0,0,0,0.30);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 17px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.4s var(--ease), color 0.4s var(--ease);
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

/* ── Navigation ── */
.nav-bar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(247,244,239,0.82);
  backdrop-filter: saturate(180%) blur(24px) brightness(1.02);
  -webkit-backdrop-filter: saturate(180%) blur(24px) brightness(1.02);
  border-bottom: 1px solid var(--border);
  transition: background 0.4s var(--ease), border-color 0.4s var(--ease);
}
[data-theme="dark"] .nav-bar { background: rgba(20,18,16,0.85); }
.nav-inner {
  max-width: 1020px; margin: 0 auto; padding: 0 32px;
  height: 56px; display: flex; align-items: center; justify-content: space-between;
}
.nav-brand { display: flex; align-items: baseline; gap: 12px; }
.nav-label {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  letter-spacing: 1.5px; text-transform: uppercase;
}
.nav-title {
  font-family: var(--font-serif); font-size: 19px; font-weight: 600;
  color: var(--text); letter-spacing: -0.2px; font-style: italic;
}
.nav-actions { display: flex; align-items: center; gap: 8px; }
.nav-btn {
  font-family: var(--font-body); font-size: 13px; font-weight: 400;
  color: var(--text-2); background: rgba(30,25,18,0.04);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 6px 14px; cursor: pointer; display: flex; align-items: center;
  gap: 6px; transition: all 0.2s var(--ease); text-decoration: none;
}
[data-theme="dark"] .nav-btn { background: rgba(255,250,242,0.05); border-color: var(--border); color: var(--text-2); }
.nav-btn:hover { background: rgba(30,25,18,0.08); color: var(--text); border-color: var(--border-2); }
[data-theme="dark"] .nav-btn:hover { background: rgba(255,250,242,0.09); color: var(--text); }

.nav-icon-btn {
  width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); background: rgba(30,25,18,0.04);
  border: 1px solid var(--border); cursor: pointer; color: var(--text-2);
  transition: all 0.2s var(--ease);
}
[data-theme="dark"] .nav-icon-btn { background: rgba(255,250,242,0.05); border-color: var(--border); color: var(--text-2); }
.nav-icon-btn:hover { background: rgba(30,25,18,0.09); color: var(--text); border-color: var(--border-2); }
[data-theme="dark"] .nav-icon-btn:hover { background: rgba(255,250,242,0.09); color: var(--text); }

/* ── Main ── */
.main { max-width: 1020px; margin: 0 auto; padding: 64px 32px 120px; }

/* ── Hero Header ── */
.page-header { text-align: center; margin-bottom: 72px; padding-top: 16px; }
.page-header-eyebrow {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px;
  opacity: 0; animation: fadeSlideUp 0.6s var(--ease-out) 0.1s forwards;
}
.page-header-title {
  font-family: var(--font-serif); font-size: 56px; font-weight: 700;
  color: var(--text); letter-spacing: -2px; line-height: 1.05; margin-bottom: 16px;
  opacity: 0; animation: fadeSlideUp 0.7s var(--ease-out) 0.2s forwards;
}
[data-theme="dark"] .page-header-title { font-weight: 600; letter-spacing: -1.5px; }
.page-header-sub {
  font-family: var(--font-body); font-size: 17px; color: var(--text-2);
  line-height: 1.6; max-width: 420px; margin: 0 auto;
  font-weight: 300; font-style: italic;
  opacity: 0; animation: fadeSlideUp 0.7s var(--ease-out) 0.35s forwards;
}
.page-header-line {
  width: 40px; height: 1px; background: var(--border-2);
  margin: 28px auto 0;
  opacity: 0; animation: fadeSlideUp 0.6s var(--ease-out) 0.5s forwards;
}

/* ── Feed ── */
.feed { display: flex; flex-direction: column; gap: 20px; }

/* ── Card ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-card);
  cursor: pointer; perspective: 1200px;
  opacity: 0; transform: translateY(24px);
  transition: box-shadow 0.35s var(--ease-out), border-color 0.25s var(--ease);
}
.card.visible {
  opacity: 1; transform: translateY(0);
  transition: opacity 0.5s var(--ease-out), transform 0.5s var(--ease-out),
              box-shadow 0.35s var(--ease-out), border-color 0.25s var(--ease);
}
.card:hover { box-shadow: var(--shadow-lg); border-color: var(--border-2); }
.card.flipped .card-inner { transform: rotateY(180deg); }

.card-inner {
  position: relative; width: 100%;
  transform-style: preserve-3d;
  transition: transform 0.55s var(--ease-out);
  border-radius: var(--radius-lg);
}
.card-front, .card-back {
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border-radius: var(--radius-lg); overflow: hidden;
}
.card-front { background: var(--surface); }
.card-back {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--surface-2); transform: rotateY(180deg);
}

.card-content-wrap { padding: 36px 40px 32px; }
.card-meta {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; gap: 12px;
}
.card-date { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.5px; }
.card-tags { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
.tag {
  font-family: var(--font-mono); font-size: 10px; font-weight: 500;
  padding: 3px 10px; border-radius: 999px; letter-spacing: 0.3px;
  transition: all 0.2s var(--ease);
}
.tag-cat { color: var(--tag-cat-txt); background: var(--tag-cat-bg); border: 1px solid var(--tag-cat-bd); }
.tag-content { color: var(--tag-cnt-txt); background: var(--tag-cnt-bg); border: 1px solid var(--tag-cnt-bd); }

.card-body {
  font-family: var(--font-body); font-size: 19px; line-height: 1.78;
  color: var(--text); letter-spacing: -0.1px; word-break: break-word; font-weight: 300;
}
.card-body p { margin: 0 0 12px; }
.card-body p:last-child { margin-bottom: 0; }
.card-body strong { font-weight: 600; color: var(--text); }
.card-body em { font-style: italic; }

.card-flip-hint {
  margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 7px;
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  letter-spacing: 0.4px; user-select: none;
}
.flip-icon {
  width: 13px; height: 13px; opacity: 0.5;
  transition: opacity 0.2s var(--ease), transform 0.3s var(--ease);
}
.card:hover .flip-icon { opacity: 0.8; transform: rotateY(15deg); }

.card-back-content { padding: 36px 40px 32px; }
.card-back-label {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px;
}
.card-back-body {
  font-family: var(--font-body); font-size: 17px; line-height: 1.80;
  color: var(--text-2); font-weight: 300;
}
.card-back-body p { margin: 0 0 10px; }
.card-back-body p:last-child { margin-bottom: 0; }
.card-back-question {
  margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
  line-height: 1.7; letter-spacing: 0.2px;
}
.card-back-question strong { color: var(--text-2); font-weight: 500; font-family: var(--font-body); font-size: 13px; }

/* ── End Marker ── */
#endMarker {
  display: none; text-align: center; padding: 48px 0;
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  letter-spacing: 2px; opacity: 0; animation: fadeIn 0.6s var(--ease-out) forwards;
}

/* ── Skeleton ── */
@keyframes shimmer {
  0%   { background-position: -600px 0; }
  100% { background-position: 600px 0; }
}
.skeleton-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 36px 40px;
  overflow: hidden; position: relative;
}
.skeleton-card::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(30,25,18,0.04) 50%, transparent 100%);
  background-size: 600px 100%;
  animation: shimmer 1.6s ease-in-out infinite;
}
[data-theme="dark"] .skeleton-card::after {
  background: linear-gradient(90deg, transparent 0%, rgba(255,250,242,0.04) 50%, transparent 100%);
  background-size: 600px 100%;
}
.skeleton-line { background: var(--surface-2); border-radius: 4px; }
.skeleton-line.short { height: 10px; width: 30%; margin-bottom: 16px; }
.skeleton-line.long  { height: 19px; width: 100%; margin-bottom: 10px; }
.skeleton-line.med  { height: 19px; width: 80%; margin-bottom: 10px; }
.skeleton-line.long2 { height: 19px; width: 65%; }

/* ── Animations ── */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes cardEntrance {
  from { opacity: 0; transform: translateY(28px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .main { padding: 40px 16px 80px; }
  .nav-inner { padding: 0 16px; }
  .page-header-title { font-size: 40px; letter-spacing: -1.5px; }
  .page-header-sub { font-size: 15px; }
  .page-header { margin-bottom: 48px; }
  .card-content-wrap, .card-back-content { padding: 24px 20px 22px; }
  .card-body { font-size: 17px; line-height: 1.70; }
  .card-back-body { font-size: 15px; }
  .card-meta { margin-bottom: 14px; }
}
@media (max-width: 480px) {
  .main { padding: 32px 12px 64px; }
  .nav-inner { padding: 0 12px; }
  .page-header-title { font-size: 32px; }
  .card-content-wrap, .card-back-content { padding: 20px 16px 18px; }
}
</style>
</head>
<body>

<nav class="nav-bar">
  <div class="nav-inner">
    <div class="nav-brand">
      <span class="nav-label">// Flow</span>
      <span class="nav-title">灵感流</span>
    </div>
    <div class="nav-actions">
      <a href="https://jeekeagle.github.io/theo-hub/" class="nav-btn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>

        Hub
      </a>
      <button class="nav-icon-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
        <svg class="sun-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>

          <line x1="1" y1="12" x2="3" y2="12"/>

        </svg>

</nav>

<main class="main">

  <div class="page-header">
    <div class="page-header-eyebrow">Inspiration in Motion</div>
    <h1 class="page-header-title">灵感流</h1>
    <p class="page-header-sub">捕捉每一个闪过的想法，将它们变成可触摸的洞见</p>
    <div class="page-header-line"></div>
  </div>

  <div class="feed" id="feed"></div>
  <div id="endMarker">— 已加载全部 —</div>

</main>

<script>
const MANIFEST = 'manifest.json';

async function loadManifest() {
  const r = await fetch(MANIFEST + '?t=' + Date.now() + '&r=' + Math.random());
  const data = await r.json();
  return data.posts || [];
}

function formatDate(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function formatBody(text) {
  text = escapeHtml(text);
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/`(.+?)`/g, '<code>$1</code>');
  const paras = text.split(/

+/);
  if (paras.length > 1) {
    return paras.map(p => '<p>' + p.replace(/
/g, '<br>') + '</p>').join('');
  }
  return text.replace(/
/g, '<br>');
}

function flipCard(card, e) {
  e.stopPropagation();
  card.classList.toggle('flipped');
}

function renderCard(post, index) {
  const card = document.createElement('div');
  card.className = 'card';

  const dateStr = formatDate(post.created);
  const catTag = post.category
    ? '<span class="tag tag-cat">' + escapeHtml(post.category) + '</span>'
    : '';
  const contentTags = (post.contentTags || []).slice(0,2).map(t =>
    '<span class="tag tag-content">' + escapeHtml(t) + '</span>'
  ).join('');

  const frontHTML =
    '<div class="card-content-wrap">' +
      '<div class="card-meta">' +
        '<span class="card-date">' + dateStr + '</span>' +
        '<div class="card-tags">' + catTag + contentTags + '</div>' +
      '</div>' +
      '<div class="card-body">' + formatBody(post.content) + '</div>' +
      '<div class="card-flip-hint">' +
        '<svg class="flip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>' +
          '<polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>' +
        '</svg>' +
        'Tap to see original' +
      '</div>' +
    '</div>';

  const originalContent = post.originalContent || post.content;
  const backHTML =
    '<div class="card-back-content">' +
      '<div class="card-back-label">Original</div>' +
      '<div class="card-back-body">' + formatBody(originalContent) + '</div>' +
      (post.question
        ? '<div class="card-back-question"><strong>Question:</strong> ' + escapeHtml(post.question) + '</div>'
        : '') +
    '</div>';

  card.innerHTML =
    '<div class="card-inner">' +
      '<div class="card-front">' + frontHTML + '</div>' +
      '<div class="card-back">' + backHTML + '</div>' +
    '</div>';

  card.addEventListener('click', e => flipCard(card, e));

  setTimeout(() => {
    card.classList.add('visible');
    card.style.animation = 'cardEntrance 0.55s cubic-bezier(0.16,1,0.3,1) ' + (index * 80) + 'ms forwards';
  }, 10);

  return card;
}

function showSkeletons(n) {
  const feed = document.getElementById('feed');
  for (let i = 0; i < n; i++) {
    const s = document.createElement('div');
    s.className = 'skeleton-card';
    s.innerHTML =
      '<div class="skeleton-line short"></div>' +
      '<div class="skeleton-line long"></div>' +
      '<div class="skeleton-line med"></div>' +
      '<div class="skeleton-line long"></div>' +
      '<div class="skeleton-line long2"></div>';
    feed.appendChild(s);
  }
}

function clearSkeletons() {
  document.querySelectorAll('.skeleton-card').forEach(el => el.remove());
}

async function loadPosts() {
  if (window.allLoaded) return;
  window.allLoaded = true;
  showSkeletons(3);
  try {
    const manifest = await loadManifest();
    clearSkeletons();
    if (manifest.length === 0) {
      const em = document.getElementById('endMarker');
      em.style.display = 'block';
      em.textContent = 'NO POSTS YET';
      return;
    }
    const sorted = manifest.slice().reverse();
    const feed = document.getElementById('feed');
    sorted.forEach((post, i) => feed.appendChild(renderCard(post, i)));
    document.getElementById('endMarker').style.display = 'block';
  } catch(e) {
    clearSkeletons();
    console.error(e);
  }
}

(function() {
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  const isDark = saved === 'dark' || (!saved && prefersDark);
  if (isDark) {
    document.documentElement.setAttribute('data-theme','dark');
    document.querySelectorAll('.sun-icon').forEach(s => s.style.display = 'none');
    document.querySelectorAll('.moon-icon').forEach(m => m.style.display = 'inline');
  }
  window.toggleTheme = function() {
    const isD = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isD) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme','light');
      document.querySelectorAll('.sun-icon').forEach(s => s.style.display = 'inline');
      document.querySelectorAll('.moon-icon').forEach(m => m.style.display = 'none');
    } else {
      document.documentElement.setAttribute('data-theme','dark');
      localStorage.setItem('theme','dark');
      document.querySelectorAll('.sun-icon').forEach(s => s.style.display = 'none');
      document.querySelectorAll('.moon-icon').forEach(m => m.style.display = 'inline');
    }
  };
})();

window.allLoaded = false;
loadPosts();
</script>
</body>
</html>
