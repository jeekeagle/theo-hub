<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow — 灵感流</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #faf8f5;
  --bg-card:     #ffffff;
  --bg-card-h:   #f8f5f0;
  --text:        #2c2825;
  --text-muted:  #9a9590;
  --text-dim:    #6a6560;
  --border:      #e8e4df;
  --border-h:    #d4cec7;
  --shadow:      0 1px 3px rgba(0,0,0,0.04);
  --shadow-h:    0 4px 12px rgba(0,0,0,0.07);
  --accent:      #c4780a;
  --accent-bg:   #fef6e6;
  --accent2:     #7a6a58;
  --tag-cat-text:    #6040c0;
  --tag-cat-bg:      #f2eefa;
  --tag-cat-border:  #d4c8f4;
  --tag-content-text:  #c0600a;
  --tag-content-bg:    #fef3e6;
  --tag-content-border:#f4d8bc;
}
[data-theme="dark"] {
  --bg:          #111118;
  --bg-card:     #1a1a22;
  --bg-card-h:   #20202a;
  --text:        #e8e4ef;
  --text-muted:  #6a6580;
  --text-dim:    #908090;
  --border:      #2a2a38;
  --border-h:    #3a3a50;
  --shadow:      0 1px 3px rgba(0,0,0,0.3);
  --shadow-h:    0 4px 12px rgba(0,0,0,0.4);
  --tag-cat-text:    #b090f0;
  --tag-cat-bg:      #1e1830;
  --tag-cat-border:  #3a2860;
  --tag-content-text:#e09050;
  --tag-content-bg:  #201810;
  --tag-content-border:#4a3020;
}

/* 精修/原始标签：发光圆点 + 淡文字，放在日期左侧 */
.tag-pair {
  display: inline-flex;
  align-items: center;
  gap: 0;
  margin-left: 10px;
}
.tag-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.tag-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-left: 5px;
  opacity: 0.6;
}
/* 精修：琥珀色圆点 */
.tag-refined .tag-dot {
  background: #c4780a;
  box-shadow: 0 0 4px rgba(196,120,10,0.5);
}
.tag-refined .tag-label { color: #9a7030; }
/* 原文：灰紫圆点 */
.tag-original .tag-dot {
  background: #8b7ab8;
  box-shadow: 0 0 4px rgba(139,122,184,0.4);
}
.tag-original .tag-label { color: #7a6a98; }
[data-theme="dark"] .tag-refined .tag-dot {
  background: #e8a445;
  box-shadow: 0 0 6px rgba(232,164,69,0.6);
}
[data-theme="dark"] .tag-refined .tag-label { color: #c09050; }
[data-theme="dark"] .tag-original .tag-dot {
  background: #a090e0;
  box-shadow: 0 0 6px rgba(160,144,224,0.5);
}
[data-theme="dark"] .tag-original .tag-label { color: #9080b8; }

/* Layout */
body {
  font-family: 'Noto Serif SC', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
  margin: 0;
}
.container {
  max-width: 680px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

/* Header */
header { margin-bottom: 40px; }
.header-inner {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}
.header-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
  margin-bottom: 4px;
}
h1 {
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: 3px;
  margin: 0;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
#hubLink {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  text-decoration: none;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: color 0.2s;
}
#hubLink:hover { color: var(--accent); }
.theme-toggle {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  padding: 4px;
  display: flex;
  align-items: center;
  transition: color 0.2s;
}
.theme-toggle:hover { color: var(--accent); }
.sun-icon, .moon-icon { display: inline; }

/* Card */
.card { margin-bottom: 16px; cursor: pointer; }
.card-front, .card-back {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 28px 32px;
  box-shadow: var(--shadow);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.card:hover .card-front,
.card:hover .card-back {
  border-color: var(--border-h);
  box-shadow: var(--shadow-h);
}
.card-back { background: var(--bg-card-h); margin-top: 8px; }
.card.flipped .card-front { display: none; }
.card:not(.flipped) .card-back { display: none; }

/* Card meta */
.card-meta {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
}
.card-meta-left {
  display: flex;
  align-items: center;
  gap: 0;
}
.card-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.8px;
  padding-top: 2px;
  white-space: nowrap;
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  justify-content: flex-end;
}

/* 标签 */
.tag-cat {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--tag-cat-text);
  background: var(--tag-cat-bg);
  border: 1px solid var(--tag-cat-border);
  padding: 1px 7px;
  border-radius: 3px;
  letter-spacing: 0.3px;
}
.tag-content {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--tag-content-text);
  background: var(--tag-content-bg);
  border: 1px solid var(--tag-content-border);
  padding: 1px 7px;
  border-radius: 3px;
  letter-spacing: 0.3px;
}

/* Card body */
.card-body {
  font-size: 21px;
  line-height: 1.85;
  color: var(--text);
  letter-spacing: 0.3px;
  word-break: break-word;
}
.card-body p { margin: 0 0 12px; }
.card-body p:last-child { margin-bottom: 0; }
.card-body strong { font-weight: 600; }
.card-body .kw { color: var(--accent); font-weight: 600; }
.card-body .en { color: var(--text-dim); font-style: italic; }

/* Flip hint */
.card-flip-hint {
  margin-top: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.2s;
}
.card:hover .card-flip-hint { opacity: 0.8; }

/* Question */
.card-question {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-top: 20px;
  padding: 14px 16px;
  background: var(--q-bg, #f5f0fa);
  border: 1px solid var(--q-border, #d8c8f0);
  border-radius: 6px;
}
.question-mark {
  color: var(--q-icon, #8060c0);
  flex-shrink: 0;
  margin-top: 1px;
}
.question-text {
  font-family: 'Noto Serif SC', serif;
  font-size: 14px;
  color: var(--q-text, #5a4880);
  line-height: 1.6;
  font-style: italic;
}
[data-theme="dark"] .card-question { background: #1e1830; border-color: #3a2860; }
[data-theme="dark"] .question-text { color: #9080b8; }
[data-theme="dark"] .question-mark { color: #a090e0; }

/* Skeleton */
.skeleton {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 28px 32px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.skeleton-line {
  height: 14px;
  background: linear-gradient(90deg, var(--border) 25%, var(--bg-card-h) 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s ease-in-out infinite;
  border-radius: 3px;
  margin-bottom: 10px;
}
.skeleton-line:last-child { margin-bottom: 0; width: 70%; }
.skeleton-line.lg { height: 18px; margin-bottom: 14px; }
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* End marker */
.end-marker {
  text-align: center;
  padding: 32px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1.5px;
}
.end-marker::before, .end-marker::after { content: '—'; margin: 0 8px; opacity: 0.4; }

/* Toast */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 8px 18px;
  border-radius: 20px;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 200;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@media (max-width: 600px) {
  .card-front, .card-back { padding: 22px 20px; }
  .container { padding: 28px 16px 80px; }
  .card-body { font-size: 18px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="header-label">// Flow</div>
      <h1>灵感流</h1>
    </div>
    <div class="header-right">
      <a href="https://jeekeagle.github.io/theo-hub/" id="hubLink" aria-label="返回 theo-hub">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        theo-hub
      </a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
        <span class="sun-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>
        <span class="moon-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
      </button>
    </div>
  </div>
</header>

<div class="container">
  <div id="feed"></div>
  <div id="endMarker" class="end-marker" style="display:none">ALL CAUGHT UP</div>
</div>

<div class="toast" id="toast"></div>

<script>
const MANIFEST = 'manifest.json';
let posts = [];
let loading = false;
let allLoaded = false;

async function loadManifest() {
  const r = await fetch(MANIFEST + '?t=' + Date.now() + '&r=' + Math.random());
  const data = await r.json();
  return data.posts || [];
}

function formatDate(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}

function formatBody(text) {
  text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
  text = text.replace(/`(.*?)`/g, '<code style="font-family:\'JetBrains Mono\',monospace;font-size:0.85em;color:var(--accent2)">$1</code>');
  text = text.replace(/\[\[(.*?)\]\]/g, '<span class="kw">[[$1]]</span>');
  const paragraphs = text.split(/\n\n+/);
  if (paragraphs.length > 1) {
    text = paragraphs.map(function(p){ return '<p>' + p.replace(/\n/g, '<br>') + '</p>'; }).join('');
  } else {
    text = text.replace(/\n/g, '<br>');
  }
  return text;
}

function renderCard(post) {
  var card = document.createElement('div');
  card.className = 'card';
  card.addEventListener('click', function() {
    card.classList.toggle('flipped');
  });

  var hasOriginal = !!(post.originalContent && post.originalContent.trim());
  var originalContent = hasOriginal ? post.originalContent : post.content;

  var catTags = (Array.isArray(post.category) ? post.category : [post.category || '想法']).map(function(t) {
    return '<span class="tag-cat">' + t + '</span>';
  }).join('');

  var contentTags = (post.contentTags || post.tags || []).map(function(t) {
    return '<span class="tag-content">' + t + '</span>';
  }).join('');

  var flipIcon = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>';

  var refinedBadge = hasOriginal
    ? '<span class="tag-pair tag-refined"><span class="tag-dot"></span><span class="tag-label">精修</span></span>'
    : '';
  var originalBadge = hasOriginal
    ? '<span class="tag-pair tag-original"><span class="tag-dot"></span><span class="tag-label">原文</span></span>'
    : '';
  var flipHintFront = hasOriginal ? '<div class="card-flip-hint">' + flipIcon + ' 查看原文</div>' : '';
  var flipHintBack = hasOriginal ? '<div class="card-flip-hint" style="opacity:0.8">' + flipIcon + ' 返回</div>' : '';

  card.innerHTML = '\
  <div class="card-front">\
    <div class="card-meta">\
      <div class="card-meta-left">\
        <span class="card-date">' + formatDate(post.created) + '</span>\
        ' + refinedBadge + '\
      </div>\
      <div class="card-tags">\
        ' + catTags + '\
        ' + contentTags + '\
      </div>\
    </div>\
    <div class="card-body">' + formatBody(post.content) + '</div>\
    ' + (post.question ? '\
    <div class="card-question">\
      <div class="question-mark">\
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>\
      </div>\
      <span class="question-text">' + formatBody(post.question) + '</span>\
    </div>' : '') + '\
    ' + flipHintFront + '\
  </div>\
  <div class="card-back">\
    <div class="card-meta">\
      <div class="card-meta-left">\
        <span class="card-date">' + formatDate(post.created) + '</span>\
        ' + originalBadge + '\
      </div>\
      <div class="card-tags">\
        ' + catTags + '\
        ' + contentTags + '\
      </div>\
    </div>\
    <div class="card-body">' + formatBody(originalContent) + '</div>\
    ' + flipHintBack + '\
  </div>';

  return card;
}

function showSkeletons(n) {
  var feed = document.getElementById('feed');
  for (var i = 0; i < n; i++) {
    var s = document.createElement('div');
    s.className = 'skeleton';
    s.innerHTML = '<div class="skeleton-line lg"></div><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line" style="width:55%"></div>';
    feed.appendChild(s);
  }
}

function clearSkeletons() {
  var els = document.querySelectorAll('.skeleton');
  for (var i = 0; i < els.length; i++) els[i].remove();
}

async function loadPosts() {
  if (loading || allLoaded) return;
  loading = true;
  showSkeletons(3);
  try {
    var manifest = await loadManifest();
    clearSkeletons();
    if (manifest.length === 0) {
      allLoaded = true;
      document.getElementById('endMarker').style.display = 'block';
      document.getElementById('endMarker').textContent = 'NO POSTS YET';
      return;
    }
    var sorted = manifest.slice().reverse();
    var feed = document.getElementById('feed');
    for (var i = 0; i < sorted.length; i++) {
      feed.appendChild(renderCard(sorted[i]));
    }
    allLoaded = true;
    document.getElementById('endMarker').style.display = 'block';
  } catch (e) {
    clearSkeletons();
    console.error(e);
  }
  loading = false;
}

(function() {
  var saved = localStorage.getItem('theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  var isDark = saved === 'dark' || (!saved && prefersDark);
  if (isDark) {
    document.documentElement.setAttribute('data-theme','dark');
    var s = document.querySelector('.sun-icon'), m = document.querySelector('.moon-icon');
    if (s) s.style.display = 'none';
    if (m) m.style.display = 'inline';
  }
  window.toggleTheme = function() {
    var isD = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isD) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme','light');
      var s = document.querySelector('.sun-icon'), m = document.querySelector('.moon-icon');
      if (s) s.style.display = 'inline';
      if (m) m.style.display = 'none';
    } else {
      document.documentElement.setAttribute('data-theme','dark');
      localStorage.setItem('theme','dark');
      var s = document.querySelector('.sun-icon'), m = document.querySelector('.moon-icon');
      if (s) s.style.display = 'none';
      if (m) m.style.display = 'inline';
    }
  };
})();

loadPosts();
</script>
</body>
</html>
