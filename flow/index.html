<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow — 灵感流</title>
<!-- v2.0.1 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   Apple Design System — Flow
   ═══════════════════════════════════════════ */

:root {
  /* Light — warm parchment */
  --bg:          #faf9f7;
  --surface:     #ffffff;
  --surface-2:   #f5f4f2;
  --border:      rgba(0,0,0,0.07);
  --border-2:    rgba(0,0,0,0.12);
  --text:        #1d1d1f;
  --text-2:      #6e6e73;
  --text-3:      #aeaeb2;
  --accent:      #0071e3;
  --accent-bg:   rgba(0,113,227,0.06);
  --tag-cat-txt:  #5e5ce6;
  --tag-cat-bg:   rgba(94,92,230,0.08);
  --tag-cat-bd:   rgba(94,92,230,0.2);
  --tag-cnt-txt:  #bf5a00;
  --tag-cnt-bg:   rgba(191,90,0,0.07);
  --tag-cnt-bd:   rgba(191,90,0,0.18);
  --shadow-sm:   0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
  --shadow-md:   0 4px 16px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.03);
  --shadow-lg:   0 12px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
  --radius-sm:   10px;
  --radius-md:   14px;
  --radius-lg:   20px;
  --font-ui:     'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  --font-mono:   'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
  --ease:        cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-out:    cubic-bezier(0, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg:          #0d0d0f;
  --surface:     #161618;
  --surface-2:   #1c1c1f;
  --border:      rgba(255,255,255,0.07);
  --border-2:    rgba(255,255,255,0.14);
  --text:        #f5f5f7;
  --text-2:      #a1a1a6;
  --text-3:      #5a5a5e;
  --accent:      #0a84ff;
  --accent-bg:   rgba(10,132,255,0.1);
  --tag-cat-txt:  #7d7aff;
  --tag-cat-bg:   rgba(125,122,255,0.1);
  --tag-cat-bd:   rgba(125,122,255,0.25);
  --tag-cnt-txt:  #ff9f0a;
  --tag-cnt-bg:   rgba(255,159,10,0.1);
  --tag-cnt-bd:   rgba(255,159,10,0.25);
  --shadow-sm:   0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md:   0 4px 16px rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.25);
  --shadow-lg:   0 12px 40px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s var(--ease), color 0.3s var(--ease);
}

/* ─── Navigation Bar ─── */
.nav-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(250,249,247,0.8);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s var(--ease), border-color 0.3s var(--ease);
}
[data-theme="dark"] .nav-bar {
  background: rgba(13,13,15,0.8);
}
.nav-inner {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.nav-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.5px;
}
.nav-title {
  font-family: var(--font-ui);
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
}
.nav-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}
.nav-btn {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  background: rgba(0,0,0,0.04);
  border: none;
  border-radius: 8px;
  padding: 5px 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: background 0.15s var(--ease), color 0.15s var(--ease);
  text-decoration: none;
}
[data-theme="dark"] .nav-btn {
  background: rgba(255,255,255,0.06);
  color: var(--text-2);
}
.nav-btn:hover {
  background: rgba(0,0,0,0.08);
  color: var(--text);
}
[data-theme="dark"] .nav-btn:hover {
  background: rgba(255,255,255,0.1);
}
.nav-icon-btn {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--text-2);
  transition: background 0.15s var(--ease), color 0.15s var(--ease);
}
.nav-icon-btn:hover {
  background: rgba(0,0,0,0.06);
  color: var(--text);
}
[data-theme="dark"] .nav-icon-btn:hover {
  background: rgba(255,255,255,0.08);
}

/* ─── Main Content ─── */
.main {
  max-width: 680px;
  margin: 0 auto;
  padding: 48px 24px 96px;
}

/* ─── Hero Header ─── */
.page-header {
  text-align: center;
  margin-bottom: 56px;
  padding-top: 24px;
}
.page-header-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.page-header-title {
  font-family: var(--font-ui);
  font-size: 40px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -1px;
  line-height: 1.1;
  margin-bottom: 12px;
}
[data-theme="dark"] .page-header-title {
  font-weight: 500;
}
.page-header-sub {
  font-family: var(--font-ui);
  font-size: 15px;
  color: var(--text-2);
  line-height: 1.5;
  max-width: 360px;
  margin: 0 auto;
}

/* ─── Card ─── */
.feed {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition:
    transform 0.25s var(--ease-out),
    box-shadow 0.25s var(--ease-out),
    border-color 0.2s var(--ease);
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--border-2);
}
.card.flipped .card-front { display: none; }
.card:not(.flipped) .card-back { display: none; }

/* Card Front */
.card-front {
  padding: 28px 32px 24px;
}
.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  gap: 12px;
}
.card-date {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.3px;
}
.card-tags {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.tag {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 20px;
  letter-spacing: 0.2px;
}
.tag-cat {
  color: var(--tag-cat-txt);
  background: var(--tag-cat-bg);
  border: 1px solid var(--tag-cat-bd);
}
.tag-content {
  color: var(--tag-cnt-txt);
  background: var(--tag-cnt-bg);
  border: 1px solid var(--tag-cnt-bd);
}

.card-body {
  font-family: var(--font-ui);
  font-size: 19px;
  line-height: 1.75;
  color: var(--text);
  letter-spacing: -0.1px;
  word-break: break-word;
}
.card-body p { margin: 0 0 10px; }
.card-body p:last-child { margin-bottom: 0; }
.card-body strong { font-weight: 600; }
.card-body .kw { color: var(--accent); font-weight: 500; }

.card-flip-hint {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.3px;
}
.flip-icon {
  width: 14px;
  height: 14px;
  opacity: 0.5;
}

/* Card Back */
.card-back {
  background: var(--surface-2);
  padding: 28px 32px;
}
.card-back-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.card-back-body {
  font-family: var(--font-ui);
  font-size: 15px;
  line-height: 1.7;
  color: var(--text-2);
}
.card-back-body p { margin: 0 0 10px; }
.card-back-body p:last-child { margin-bottom: 0; }
.card-back-question {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-3);
  line-height: 1.6;
}
.card-back-question strong {
  color: var(--text-2);
  font-weight: 500;
}

/* ─── End Marker ─── */
#endMarker {
  display: none;
  text-align: center;
  padding: 40px 0;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 1px;
}

/* ─── Skeleton ─── */
@keyframes skeleton-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.skeleton-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 28px 32px;
  margin-bottom: 16px;
}
.skeleton-line {
  background: var(--surface-2);
  border-radius: 4px;
  animation: skeleton-pulse 1.8s ease-in-out infinite;
}
.skeleton-line.short { height: 12px; width: 40%; margin-bottom: 12px; }
.skeleton-line.long  { height: 20px; width: 100%; margin-bottom: 8px; }
.skeleton-line.med  { height: 20px; width: 75%; }

/* ─── Responsive ─── */
@media (max-width: 640px) {
  .page-header-title { font-size: 32px; }
  .card-front, .card-back { padding: 22px 20px 20px; }
  .card-body { font-size: 17px; }
}
</style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="nav-bar">
  <div class="nav-inner">
    <div class="nav-brand">
      <span class="nav-label">// Flow</span>
      <span class="nav-title">灵感流</span>
    </div>
    <div class="nav-actions">
      <a href="https://jeekeagle.github.io/theo-hub/" class="nav-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Hub
      </a>
      <button class="nav-icon-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
        <svg class="sun-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="moon-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>
</nav>

<!-- Main -->
<main class="main">

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header-eyebrow">Inspiration in Motion</div>
    <h1 class="page-header-title">灵感流</h1>
    <p class="page-header-sub">捕捉每一个闪过的想法，将它们变成可触摸的洞察</p>
  </div>

  <!-- Feed -->
  <div class="feed" id="feed"></div>
  <div id="endMarker">— 已加载全部 —</div>

</main>

<script>
const MANIFEST = 'manifest.json';
let posts = [];
let loading = false;
let allLoaded = false;

async function loadManifest() {
  const r = await fetch(MANIFEST + '?t=' + Date.now() + '&r=' + Math.random());
  const data = await r.json();
  return data.posts || [];
}

function formatDate(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}

function formatBody(text) {
  text = text.replace(/<strong>(.*?)<\/strong>/g, '**$1**');
  text = text.replace(/<em>(.*?)<\/em>/g, '*$1*');
  text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
  text = text.replace(/`(.*?)`/g, '<code style="font-family:var(\'--font-mono\'),monospace;font-size:0.85em;color:var(--accent)">$1</code>');
  text = text.replace(/\[\[(.*?)\]\]/g, '<span class="kw">[[$1]]</span>');
  const paragraphs = text.split(/\n\n+/);
  if (paragraphs.length > 1) {
    text = paragraphs.map(function(p){ return '<p>' + p.replace(/\n/g, '<br>') + '</p>'; }).join('');
  } else {
    text = text.replace(/\n/g, '<br>');
  }
  return text;
}

function flipCard(card, post) {
  card.classList.toggle('flipped');
}

function renderCard(post) {
  var card = document.createElement('div');
  card.className = 'card';

  var front = document.createElement('div');
  front.className = 'card-front';

  var dateStr = formatDate(post.created);

  var catTag = post.category
    ? '<span class="tag tag-cat">' + post.category + '</span>'
    : '';
  var contentTags = (post.contentTags || []).slice(0,2).map(function(t){
    return '<span class="tag tag-content">' + t + '</span>';
  }).join('');

  front.innerHTML =
    '<div class="card-meta">' +
      '<span class="card-date">' + dateStr + '</span>' +
      '<div class="card-tags">' + catTag + contentTags + '</div>' +
    '</div>' +
    '<div class="card-body">' + formatBody(post.content) + '</div>' +
    '<div class="card-flip-hint">' +
      '<svg class="flip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>' +
        '<polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>' +
      '</svg>' +
      'Tap to see original' +
    '</div>';

  var back = document.createElement('div');
  back.className = 'card-back';
  var originalContent = post.originalContent || post.content;
  back.innerHTML =
    '<div class="card-back-label">Original</div>' +
    '<div class="card-back-body">' + formatBody(originalContent) + '</div>' +
    (post.question ? '<div class="card-back-question"><strong>Question:</strong> ' + post.question + '</div>' : '');

  card.appendChild(front);
  card.appendChild(back);
  card.addEventListener('click', function(){ flipCard(card, post); });
  return card;
}

function showSkeletons(n) {
  var feed = document.getElementById('feed');
  for (var i = 0; i < n; i++) {
    var s = document.createElement('div');
    s.className = 'skeleton-card';
    s.innerHTML =
      '<div class="skeleton-line short"></div>' +
      '<div class="skeleton-line long"></div>' +
      '<div class="skeleton-line med"></div>' +
      '<div class="skeleton-line long"></div>';
    feed.appendChild(s);
  }
}

function clearSkeletons() {
  var els = document.querySelectorAll('.skeleton-card');
  for (var i = 0; i < els.length; i++) els[i].remove();
}

async function loadPosts() {
  if (loading || allLoaded) return;
  loading = true;
  showSkeletons(3);
  try {
    var manifest = await loadManifest();
    clearSkeletons();
    if (manifest.length === 0) {
      allLoaded = true;
      document.getElementById('endMarker').style.display = 'block';
      document.getElementById('endMarker').textContent = 'NO POSTS YET';
      return;
    }
    var sorted = manifest.slice().reverse();
    var feed = document.getElementById('feed');
    for (var i = 0; i < sorted.length; i++) {
      feed.appendChild(renderCard(sorted[i]));
    }
    allLoaded = true;
    document.getElementById('endMarker').style.display = 'block';
  } catch (e) {
    clearSkeletons();
    console.error(e);
  }
  loading = false;
}

(function() {
  var saved = localStorage.getItem('theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  var isDark = saved === 'dark' || (!saved && prefersDark);
  if (isDark) {
    document.documentElement.setAttribute('data-theme','dark');
    var s = document.querySelector('.sun-icon'), m = document.querySelector('.moon-icon');
    if (s) s.style.display = 'none';
    if (m) m.style.display = 'inline';
  }
  window.toggleTheme = function() {
    var isD = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isD) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme','light');
      var s = document.querySelector('.sun-icon'), m = document.querySelector('.moon-icon');
      if (s) s.style.display = 'inline';
      if (m) m.style.display = 'none';
    } else {
      document.documentElement.setAttribute('data-theme','dark');
      localStorage.setItem('theme','dark');
      var s = document.querySelector('.sun-icon'), m = document.querySelector('.moon-icon');
      if (s) s.style.display = 'none';
      if (m) m.style.display = 'inline';
    }
  };
})();

loadPosts();
</script>
</body>
</html>
