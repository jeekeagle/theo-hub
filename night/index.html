<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night — 自动写作输出</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ─── Variables ─── */
:root {
  --bg: #050810;
  --bg-card: #080d1a;
  --bg-hover: #0d1530;
  --border: #1a2845;
  --accent: #00d4aa;
  --accent-dim: rgba(0,212,170,0.15);
  --accent2: #4a9eff;
  --text: #dce8f0;
  --text-dim: #8aacc8;
  --text-muted: #4a6a8a;
  --font-mono: 'JetBrains Mono', monospace;
  --font-sans: 'Noto Sans SC', sans-serif;
  --radius: 8px;
  --transition: 0.2s ease;
}

[data-theme="light"] {
  --bg: #f7f6f3;
  --bg-card: #ffffff;
  --bg-hover: #f0efe8;
  --border: #d4d0c8;
  --accent: #b86c08;
  --accent-dim: rgba(184,108,8,0.1);
  --accent2: #1d4ed8;
  --text: #111110;
  --text-dim: #444440;
  --text-muted: #888880;
}

/* ─── Reset ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  min-height: 100vh;
  line-height: 1.7;
  transition: background var(--transition), color var(--transition);
}

/* ─── Grid BG ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,170,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,170,0.035) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ─── Layout ─── */
.container {
  max-width: 760px;
  margin: 0 auto;
  padding: 48px 24px 80px;
  position: relative;
  z-index: 1;
}

/* ─── Header ─── */
header {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 48px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.header-left {}

.header-label {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--accent);
  letter-spacing: 3px;
  margin-bottom: 10px;
  text-transform: uppercase;
}

header h1 {
  font-family: var(--font-mono);
  font-size: clamp(26px, 5vw, 44px);
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.5px;
  margin-bottom: 10px;
  line-height: 1.2;
}

header h1 span { color: var(--accent); }

.header-desc {
  font-size: 18px;
  color: var(--text-dim);
  font-weight: 300;
  max-width: 480px;
  line-height: 1.7;
}

.header-status {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-top: 18px;
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--text-muted);
}

.dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  flex-shrink: 0;
}

/* ─── Theme Toggle ─── */
#themeToggle {
  position: absolute;
  top: 0;
  right: 0;
  font-family: var(--font-mono);
  font-size: 17px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 12px;
  cursor: pointer;
  color: var(--text-dim);
  transition: border-color var(--transition), color var(--transition), background var(--transition);
  flex-shrink: 0;
}

#themeToggle:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-dim);
}

[data-theme="light"] #themeToggle { color: #111110; }

.header-right { display: flex; align-items: center; gap: 14px; }

[data-theme="dark"] #themeToggle {
  color: #dce8f0;
}

#hubLink {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.3px;
  color: var(--text-dim);
  text-decoration: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: border-color var(--transition), color var(--transition), background var(--transition);
}

#hubLink:hover {
  border-color: var(--accent2);
  color: var(--accent2);
  background: rgba(74,158,255,0.08);
}

#hubLink svg {
  flex-shrink: 0;
  transition: transform var(--transition);
}

#hubLink:hover svg {
  transform: translateX(-2px);
}

/* ─── Post List ─── */
.post-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.post-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 28px;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition), transform var(--transition);
}

.post-card:hover {
  border-color: var(--accent);
  background: var(--bg-hover);
  transform: translateX(4px);
}

.post-card:hover .post-title { color: var(--accent); }

.post-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.post-time {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--text-muted);
}

.post-tag {
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 2px 8px;
  border-radius: 3px;
  background: var(--accent-dim);
  border: 1px solid var(--accent);
  color: var(--accent);
}

.post-title {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 10px;
  transition: color var(--transition);
  line-height: 1.4;
}

.post-desc {
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 300;
  line-height: 1.7;
}

/* ─── Empty State ─── */
.empty-state {
  text-align: center;
  padding: 80px 0;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  line-height: 2;
}

.empty-state .icon {
  font-size: 32px;
  margin-bottom: 16px;
  opacity: 0.4;
}

/* ─── Loading ─── */
.loading-state {
  text-align: center;
  padding: 60px 0;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
}

/* ─── Detail View ─── */
.detail-view { display: none; }
.detail-view.active { display: block; }
.list-view.hidden { display: none; }

.back-btn {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent2);
  background: none;
  border: 1px solid rgba(74,158,255,0.25);
  border-radius: var(--radius);
  padding: 6px 14px;
  cursor: pointer;
  margin-bottom: 28px;
  transition: border-color var(--transition), background var(--transition);
}

.back-btn:hover {
  border-color: var(--accent2);
  background: rgba(74,158,255,0.08);
}

.detail-header { margin-bottom: 32px; }

.detail-title {
  font-family: var(--font-mono);
  font-size: clamp(20px, 4vw, 32px);
  font-weight: 600;
  color: var(--text);
  margin-bottom: 14px;
  line-height: 1.3;
}

.detail-meta {
  display: flex;
  gap: 16px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.detail-body {
  font-size: 15px;
  line-height: 1.9;
  color: var(--text);
}

.detail-body h1,
.detail-body h2,
.detail-body h3 {
  font-family: var(--font-mono);
  color: var(--text);
  margin: 28px 0 14px;
  line-height: 1.4;
}

.detail-body h2 { font-size: 18px; color: var(--accent); }
.detail-body h3 { font-size: 15px; }

.detail-body p { margin-bottom: 18px; }

.detail-body a { color: var(--accent2); text-decoration: none; }
.detail-body a:hover { text-decoration: underline; }

.detail-body code {
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--accent-dim);
  padding: 2px 6px;
  border-radius: 3px;
  color: var(--accent);
}

.detail-body pre {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  overflow-x: auto;
  margin-bottom: 18px;
}

.detail-body pre code {
  background: none;
  padding: 0;
  color: var(--text);
  font-size: 13px;
}

.detail-body blockquote {
  border-left: 2px solid var(--accent);
  padding-left: 18px;
  color: var(--text-dim);
  margin: 20px 0;
  font-style: italic;
}

.detail-body ul,
.detail-body ol {
  padding-left: 22px;
  margin-bottom: 18px;
}

.detail-body li { margin-bottom: 6px; }

.detail-body hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 32px 0;
}

/* ─── Footer ─── */
footer {
  margin-top: 64px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  flex-wrap: wrap;
  gap: 14px;
}

/* ─── Animations ─── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.post-card { animation: fadeIn 0.3s ease both; }
.post-card:nth-child(1) { animation-delay: 0.05s; }
.post-card:nth-child(2) { animation-delay: 0.10s; }
.post-card:nth-child(3) { animation-delay: 0.15s; }
.post-card:nth-child(4) { animation-delay: 0.20s; }
.post-card:nth-child(5) { animation-delay: 0.25s; }

/* ─── Responsive ─── */
@media (max-width: 600px) {
  .container { padding: 32px 16px 60px; }
  header h1 { font-size: 26px; }
  .post-card { padding: 18px 20px; }
  .header-status { flex-direction: column; gap: 6px; align-items: flex-start; }
}

/* Card Preview Overlay */
.card-preview-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .25s ease;
}
.card-preview-overlay.open { opacity: 1; pointer-events: all; }
.card-preview-content {
  background: var(--bg-card, #13131a); border: 1px solid var(--border, #2a2a35);
  border-radius: 12px; width: 92%; max-width: 720px; max-height: 88vh;
  overflow-y: auto; position: relative;
  transform: scale(.94); transition: transform .25s ease;
  padding: 36px;
}
.card-preview-overlay.open .card-preview-content { transform: scale(1); }
.card-preview-close {
  position: absolute; top: 14px; right: 18px; background: none;
  border: none; color: var(--text-dim, #71717a); font-size: 22px;
  cursor: pointer; padding: 4px; line-height: 1;
}
.card-preview-close:hover { color: var(--text, #e4e4e7); }
.card-preview-title {
  font-family: var(--font-mono, ui-monospace); font-size: 22px;
  font-weight: 600; color: var(--accent, #00d992); margin-bottom: 20px;
}
.card-preview-body { color: var(--text-dim, #71717a); font-size: 14px; line-height: 1.8; }
.card-preview-placeholder {
  color: var(--text-muted, #3f3f46); font-style: italic; font-size: 13px;
  padding: 20px 0;
}

</style>
</head>
<body>
<div class="container">

<header id="siteHeader">
  <div class="header-top">
    <div class="header-left">
      <div class="header-label">// NIGHT ROUTINE · 01:30</div>
      <h1>Night <span>Output</span></h1>
      <p class="header-desc">你只管入梦，思想自有回声。<br>Hermes 接管白日的碎片，在暗夜为你凝结成清晨的洞见。</p>
      <div class="header-status">
        <div><span class="dot"></span>自动运行</div>
        <div>NOTE &rarr; Night Routine &rarr; Seed</div>
        <div>Hermes 24/7</div>
      </div>
    </div>
    <div class="header-right">
    <button id="themeToggle" aria-label="切换主题">☀</button>
    <a href="https://jeekeagle.github.io/theo-hub/" id="hubLink" aria-label="返回 theo-hub"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> theo-hub</a>
    </div>
  </div>
</header>

<!-- List view -->
<div class="list-view" id="listView">
  <div id="postList">
    <div class="loading-state">加载中...</div>
  </div>
</div>

<!-- Detail view -->
<div class="detail-view" id="detailView">
  <button class="back-btn" id="backBtn">&larr; 返回列表</button>
  <div class="detail-header">
    <h2 class="detail-title" id="detailTitle"></h2>
    <div class="detail-meta">
      <span id="detailTime"></span>
      <span id="detailTags"></span>
    </div>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<footer>
  <span id="footerVersion">night &mdash; 2026</span>
  <span>Hermes Night Routine &middot; 全自动输出</span>
</footer>
</div>

<script>
// ─── Config ───
const CONFIG = {
  seedRepo: 'jeekeagle/Seed',
  seedBranch: 'main',
  seedPath: "src/content/night",
  themeKey: 'night-theme-v2'
};

// ─── State ───
let allPosts = [];

// ─── Load posts via jsdelivr CDN (CORS-enabled) ───
async function loadPosts() {
  try {
    // Get directory listing via GitHub API (CORS-enabled)
    const apiUrl = `https://api.github.com/repos/${CONFIG.seedRepo}/contents/${CONFIG.seedPath}`;
    const resp = await fetch(apiUrl);
    if (!resp.ok) throw new Error(`GitHub API ${resp.status}`);
    const data = await resp.json();
    const mdFiles = data.filter(f => f.name.endsWith('.md'));

    // Read all posts in parallel via jsdelivr CDN
    const posts = await Promise.all(
      mdFiles.map(async (f) => {
        try {
          const rawUrl = `https://cdn.jsdelivr.net/gh/${CONFIG.seedRepo}@${CONFIG.seedBranch}/${CONFIG.seedPath}/${f.name}`;
          const rawResp = await fetch(rawUrl);
          if (!rawResp.ok) return null;
          const raw = await rawResp.text();
          return parseFrontmatter(raw, f.name);
        } catch {
          return null;
        }
      })
    );

    allPosts = posts
      .filter(p => p && p.title)
      .sort((a, b) => new Date(b.pubDatetime) - new Date(a.pubDatetime));

    renderList();
  } catch (err) {
    console.error('loadPosts failed:', err);
    document.getElementById('postList').innerHTML =
      `<div class="empty-state">
        <div class="icon">&#9888;</div>
        <div>加载失败</div>
        <div style="margin-top:8px;font-size:10px">${err.message}</div>
      </div>`;
  }
}

// ─── Parse Frontmatter ───
function parseFrontmatter(raw, filename) {
  const match = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!match) return { title: '', body: raw, filename };

  const yaml = match[1];
  const body = match[2];
  const meta = {};

  yaml.split('\n').forEach(line => {
    const [key, ...rest] = line.split(':');
    if (key && rest.length > 0) {
      meta[key.trim()] = rest.join(':').trim().replace(/^["']|["']$/g, '');
    }
  });

  // Parse tags (yaml array format: [tag1, tag2])
  if (meta.tags) {
    const tagsMatch = meta.tags.match(/\[(.*)\]/);
    if (tagsMatch) {
      meta.tags = tagsMatch[1].split(',').map(t => t.trim());
    } else {
      meta.tags = meta.tags.split(',').map(t => t.trim());
    }
  } else {
    meta.tags = [];
  }

  return {
    title: meta.title || '',
    pubDatetime: meta.pubDatetime || '',
    slug: meta.slug || filename.replace('.md', ''),
    tags: meta.tags,
    description: meta.description || '',
    body: body,
    filename
  };
}

// ─── Render ───
function renderList() {
  const list = document.getElementById('postList');

  if (allPosts.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="icon">&#9789;</div>
      <div>等待 Night Routine 生成第一批内容...</div>
    </div>`;
    return;
  }

  list.innerHTML = allPosts.map((p, i) => `
    <div class="post-card" data-index="${i}">
      <div class="post-meta">
        <span class="post-time">${formatDate(p.pubDatetime)}</span>
        ${p.tags.map(t => `<span class="post-tag">${t}</span>`).join('')}
      </div>
      <div class="post-title">${p.title}</div>
      <div class="post-desc">${stripTags(p.description || parseFirstParagraph(p.body))}</div>
    </div>
  `).join('');

  list.querySelectorAll('.post-card').forEach(card => {
    card.addEventListener('click', () => {
      const idx = parseInt(card.dataset.index);
      showDetail(idx);
    });
  });

  // Update footer
  document.getElementById('footerVersion').textContent =
    `night · ${allPosts.length} 篇文章`;
}

function stripTags(html) {
  return (html || '').replace(/<[^>]+>/g, '').replace(/&nbsp;/g, ' ').trim();
}

function parseFirstParagraph(body) {
  if (!body) return '';
  const lines = body.split('\n').filter(l => l.trim() && !l.startsWith('#'));
  return lines[0] || '';
}

function formatDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  } catch {
    return iso;
  }
}

function parseMarkdown(body) {
  // Simple markdown parser for detail view
  if (typeof marked !== 'undefined') {
    return marked.parse(body || '');
  }
  // Fallback: basic formatting
  return (body || '')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(.+)$/gm, (m) => {
      if (m.startsWith('<')) return m;
      return `<p>${m}</p>`;
    });
}

// ─── Detail ───
function showDetail(idx) {
  const post = allPosts[idx];
  if (!post) return;

  document.getElementById('detailTitle').textContent = post.title;
  document.getElementById('detailTime').textContent = formatDate(post.pubDatetime);
  document.getElementById('detailTags').textContent = (post.tags || []).join(' · ');
  document.getElementById('detailBody').innerHTML = parseMarkdown(post.body);

  document.getElementById('listView').classList.add('hidden');
  document.getElementById('siteHeader').style.display = 'none';
  document.getElementById('detailView').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('backBtn').addEventListener('click', () => {
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('listView').classList.remove('hidden');
  document.getElementById('siteHeader').style.display = '';
});

// ─── Theme ───
const themeToggle = document.getElementById('themeToggle');

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem(CONFIG.themeKey, theme);
  themeToggle.textContent = theme === 'light' ? '☾' : '☀';
  themeToggle.setAttribute('aria-label', theme === 'light' ? '切换到暗色模式' : '切换到亮色模式');
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
}

// Init theme from localStorage or system preference
(function initTheme() {
  const saved = localStorage.getItem(CONFIG.themeKey);
  if (saved) {
    applyTheme(saved);
  } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
    applyTheme('light');
  } else {
    applyTheme('dark');
  }
})();

themeToggle.addEventListener('click', toggleTheme);

// ─── Boot ───
loadPosts();

(function(){
  var overlay = document.getElementById('cardPreviewOverlay');
  var closeBtn = document.getElementById('cardPreviewClose');
  var titleEl = document.getElementById('cardPreviewTitle');
  var bodyEl = document.getElementById('cardPreviewBody');

  function openCard(card) {
    var title = card.querySelector('.card-title, .style-card-name, h3, h2') ||
                card.querySelector('[class*="title"]') || document.createElement('span');
    titleEl.textContent = title.textContent || title.innerText || '卡片预览';
    bodyEl.innerHTML = '<p class="card-preview-placeholder">卡片详情展示区域 · 更多信息待填充</p>';
    overlay.classList.add('open');
  }
  function closeOverlay() { overlay.classList.remove('open'); }

  var cards = document.querySelectorAll('.post-card');
  cards.forEach(function(card){
    card.style.cursor = 'pointer';
    card.addEventListener('click', function(e){
      if (e.target.closest('a, button')) return;
      openCard(card);
    });
